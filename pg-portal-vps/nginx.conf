# /etc/nginx/sites-available/pgrates.unifiedpaygate.com
# Nginx reverse proxy config for PG Rate Portal
#
# After placing this file, run:
#   sudo ln -s /etc/nginx/sites-available/pgrates.unifiedpaygate.com /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx

server {
    listen 80;
    server_name pgrates.unifiedpaygate.com;

    # Redirect HTTP → HTTPS (after SSL is set up with certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pgrates.unifiedpaygate.com;

    # SSL — certbot fills these in automatically
    ssl_certificate     /etc/letsencrypt/live/pgrates.unifiedpaygate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pgrates.unifiedpaygate.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # Proxy to Node.js app
    location / {
        proxy_pass         http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    # Cache static assets (portal HTML/CSS/JS)
    location ~* \.(html|css|js|png|jpg|ico|svg|woff2?)$ {
        proxy_pass         http://127.0.0.1:3011;
        proxy_set_header   Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # Logs
    access_log /var/log/nginx/pgrates.access.log;
    error_log  /var/log/nginx/pgrates.error.log;
}
